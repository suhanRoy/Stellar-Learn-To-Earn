name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: wasm32-unknown-unknown
        
    - name: Run Contract Tests
      working-directory: ./contracts
      run: |
        cargo build -p reward_token --target wasm32-unknown-unknown --release
        cargo test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
      
    - name: Build Next.js app
      working-directory: ./frontend
      run: npm run build

  deploy:
    needs: [test-contracts, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel (Simulated)
      run: |
        echo "🚀 Deploying to Production..."
        echo "✅ Deployment successful. Available at https://stellar-learn-to-earn.vercel.app"
